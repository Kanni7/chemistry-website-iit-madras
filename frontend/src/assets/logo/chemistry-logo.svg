<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" className="h-full w-full">
  <defs>
    <style>
      .text-main { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 26px; font-weight: 800; fill: #1f2937; letter-spacing: -0.5px; }
      .text-sub { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #4b5563; letter-spacing: 1.5px; text-transform: uppercase; }
      .accent { fill: #b45309; }
    </style>
  </defs>
  
  <!-- Academic Shield/Icon -->
  <g transform="translate(10, 15)">
    <!-- Base Shield -->
    <path d="M25,0 L50,10 L50,30 C50,45 35,55 25,60 C15,55 0,45 0,30 L0,10 Z" fill="#eef1f4" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Flask Element -->
    <path d="M20,15 L30,15 L30,25 L38,40 A4,4 0 0,1 35,45 L15,45 A4,4 0 0,1 12,40 L20,25 Z" class="accent"/>
    <rect x="23" y="10" width="4" height="6" fill="#1f2937"/>
  </g>

  <!-- Typography -->
  <text x="75" y="42" class="text-main">CHEMISTRY</text>
  <text x="77" y="58" class="text-sub">IIT MADRAS</text>
</svg>
